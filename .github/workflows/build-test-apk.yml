name: Build Test APK

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-test-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Prepare APK asset
        run: |
          mkdir -p dist
          if [ "${{ github.event_name }}" = "release" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk "dist/BT_Android_agent-${{ github.event.release.tag_name }}-debug.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "dist/BT_Android_agent-debug.apk"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bt-android-agent-test-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
